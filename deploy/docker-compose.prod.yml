version: '3.8'

services:

  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    networks:
      - chapuu_network
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chapuu_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - chapuu_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  backend:
    build:
      context: ./chapuu-backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chapuu_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.middlewares=security-headers@file,api-rate-limit@file"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.services.backend.loadbalancer.healthcheck.path=/api/health/"
      - "traefik.http.services.backend.loadbalancer.healthcheck.interval=30s"
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  celery_worker:
    build:
      context: ./chapuu-backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    entrypoint: []
    command: celery -A config worker -l warning --concurrency 2 --max-tasks-per-child 100
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chapuu_network
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  celery_beat:
    build:
      context: ./chapuu-backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    entrypoint: []
    command: celery -A config beat -l warning
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chapuu_network
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  nginx_static:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - media_files:/usr/share/nginx/html/media:ro
      - static_files:/usr/share/nginx/html/static:ro
      - ./nginx_static.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - chapuu_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.static.rule=Host(`${API_DOMAIN}`) && (PathPrefix(`/media`) || PathPrefix(`/static`))"
      - "traefik.http.routers.static.entrypoints=websecure"
      - "traefik.http.routers.static.tls.certresolver=letsencrypt"
      - "traefik.http.routers.static.priority=20"
      - "traefik.http.services.static.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  frontend:
    build:
      context: ./chapuu-web-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_BACKEND_URL: https://${API_DOMAIN}
    restart: unless-stopped
    networks:
      - chapuu_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.middlewares=security-headers@file"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  traefik_logs:

networks:
  chapuu_network:
    driver: bridge
